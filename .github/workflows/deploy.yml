name: Release to main and deploy Pages

# Pushes to a claude/** feature branch fast-forward main to that commit, then
# build and deploy run from main. This exists because pushes directly to main
# from Claude's sandbox are blocked by a session-level proxy allow-list — but
# GitHub Actions can push to main using GITHUB_TOKEN (contents: write).

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  release-to-main:
    # Skip the promotion when the push is already on main (avoid pointless work).
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fast-forward main to ${{ github.ref_name }}
        # Non-force push: creates main if it doesn't exist, fast-forwards if
        # it does, and FAILS LOUDLY if main has diverged — rather than
        # silently overwriting unrelated work on main.
        run: git push origin HEAD:refs/heads/main

  build:
    needs: [release-to-main]
    # Run after the FF succeeds, OR when the workflow was triggered directly
    # on main (in which case release-to-main was skipped, not failed).
    if: |
      always() &&
      (needs.release-to-main.result == 'success' || needs.release-to-main.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
